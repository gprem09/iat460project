<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Algorithmic Loom</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --bg-color: #f0f2f8;
            --text-color: #1e1f2e;
            --secondary-text: #6b7280;
            --accent-color: #5b6ef5;
            --accent-hover: #4354e0;
            --border-color: #d1d8f0;
            --surface-color: #ffffff;
            --terminal-green: #4f46e5;
            --glow: 0 0 18px rgba(91, 110, 245, 0.2);
        }

        body {
            font-family: 'Space Mono', monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(139, 154, 255, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(167, 139, 250, 0.1) 0%, transparent 50%);
        }

        header {
            text-align: center;
            margin-bottom: 1.5rem;
            max-width: 800px;
            padding: 0 1.5rem;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.2rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #5b6ef5 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
        }

        .subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            font-style: italic;
            color: var(--secondary-text);
            line-height: 1.5;
            max-width: 650px;
            margin: 0 auto;
        }

        main {
            width: 100%;
            max-width: 650px;
            padding: 2.2rem;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 40px rgba(91, 110, 245, 0.1), 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 2rem;
            box-sizing: border-box;
            position: relative;
        }
        
        main::before, main::after {
            content: '';
            position: absolute;
            width: 15px;
            height: 15px;
            border: 1px solid var(--accent-color);
            opacity: 0.4;
        }
        main::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
        main::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        label::before {
            content: '>';
            color: #818cf8;
        }

        textarea {
            width: 100%;
            height: 160px;
            padding: 1.2rem;
            border: 1px solid var(--border-color);
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            line-height: 1.6;
            resize: none;
            background-color: #f8f9ff;
            color: var(--text-color);
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: var(--glow);
            background-color: #ffffff;
        }
        
        textarea::placeholder {
            color: #b0b8d8;
            font-style: italic;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        button {
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 1rem;
            font-family: 'Space Mono', monospace;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        button#generateBtn {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        button.secondary {
            border-color: var(--border-color);
            color: var(--secondary-text);
        }

        button:hover:not(:disabled) {
            background-color: var(--accent-color);
            color: #ffffff;
            box-shadow: var(--glow);
        }
        
        button.secondary:hover:not(:disabled) {
            background-color: var(--text-color);
            color: #ffffff;
            border-color: var(--text-color);
        }

        button:active:not(:disabled) {
            transform: scale(0.98);
        }

        button:disabled {
            border-color: #d1d8f0;
            color: #b0b8d8;
            cursor: not-allowed;
            background: transparent;
        }

        .status {
            margin-top: 2rem;
            text-align: left;
            font-size: 0.85rem;
            min-height: 24px;
            color: var(--terminal-green);
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
        }
        
        .error {
            color: #ef4444;
        }

        .spinner {
            display: inline-block;
            width: 8px;
            height: 15px;
            background-color: var(--accent-color);
            margin-right: 12px;
            display: none;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .canvas-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 2.5rem;
            position: relative;
        }

        canvas {
            box-shadow: 0 4px 24px rgba(91, 110, 245, 0.15), 0 1px 4px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
            background-color: #fdfcfa;
        }
    </style>
</head>
<body>

    <header>
        <h1>Algorithmic Loom</h1>
        <p class="subtitle">Words become threads. Emotion becomes structure.</p>
    </header>

    <main>
        <div id="inputSection" class="input-group">
            <label for="journalEntry">Sys.Input [Awaiting Narrative]</label>
            <textarea id="journalEntry" placeholder="Enter a poem, a journal entry, a memory, or simply how you feel today..."></textarea>
            
            <div class="button-group">
                <button id="generateBtn" onclick="generatePattern()">[ Execute Weave ]</button>
            </div>
        </div>

        <div id="canvasSection" class="canvas-container" style="display: none; flex-direction: column; align-items: center;">
            <canvas id="weaveCanvas" width="400" height="400"></canvas>
            
            <div class="button-group" style="width: 100%; max-width: 400px; margin-top: 1.5rem;">
                <button class="secondary" onclick="resetUI()">[ New Weave ]</button>
                <button id="downloadBtn" onclick="downloadPDF()" style="display: none;">[ Export PDF ]</button>
            </div>
        </div>
        
        <div class="status" id="statusContainer" style="flex-direction: column; align-items: flex-start; justify-content: center; width: 100%;">
            <div style="display: flex; align-items: center; min-height: 24px;">
                <div class="spinner" id="spinner"></div>
                <span id="message"></span>
            </div>
            
            <div id="progressUi" style="display: none; width: 100%; margin-top: 1.5rem;">
                <div style="width: 100%; border: 1px solid var(--border-color); height: 8px; background: rgba(0,0,0,0.5); position: relative; overflow: hidden;">
                    <div id="progressBar" style="width: 0%; height: 100%; background: var(--accent-color); transition: width 0.1s linear; box-shadow: 0 0 10px var(--accent-color);"></div>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--secondary-text); margin-top: 0.5rem; letter-spacing: 1px;">
                    <span id="progressText">0% [SYSTEM IDLE]</span>
                    <span id="timeText">T+ 0.00s</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        // idk if i need all these
        const loadingMessages = [
            "INITIATING SENTIMENT ANALYSIS...",
            "EXTRACTING EMOTIONAL VECTORS...",
            "CALCULATING NOISE PARAMETERS...",
            "PREPARING DIGITAL LOOM..."
        ];

        let currentPatternData = null; 
        let messageInterval = null;

        function resetUI() {
            // console.log("resetting UI")
            document.getElementById('inputSection').style.display = 'flex';
            document.getElementById('canvasSection').style.display = 'none';
            document.getElementById('downloadBtn').style.display = 'none';
            document.getElementById('progressUi').style.display = 'none';
            document.getElementById('journalEntry').value = '';
            document.getElementById('message').textContent = '';
            document.getElementById('generateBtn').disabled = false;
        }

        async function generatePattern() {
            const txt = document.getElementById('journalEntry').value.trim();
            const btn = document.getElementById('generateBtn');
            const dBtn = document.getElementById('downloadBtn');
            const msg = document.getElementById('message');
            const spin = document.getElementById('spinner');
            const canv = document.getElementById('weaveCanvas');
            const ctx = canv.getContext('2d');

            if (!txt) {
                // alert("provide text");
                msg.textContent = "ERR: Please provide input data to weave.";
                msg.className = 'error';
                return;
            }

            btn.disabled = true;
            msg.className = '';
            spin.style.display = 'inline-block';
            
            let idx = 0;
            msg.textContent = loadingMessages[idx];
            
            // progress stuff
            document.getElementById('progressUi').style.display = 'block';
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('progressText').textContent = '0% [ANALYZING]';
            document.getElementById('timeText').textContent = 'T+ 0.00s';
            
            let start = Date.now();
            let simProg = 0;

            messageInterval = setInterval(() => {
                let elap = (Date.now() - start) / 1000;
                document.getElementById('timeText').textContent = `T+ ${elap.toFixed(2)}s`;
                
                // cheat the progress bar to slow down near 95
                simProg += (95 - simProg) * 0.02;
                document.getElementById('progressBar').style.width = `${simProg}%`;
                document.getElementById('progressText').textContent = `${Math.floor(simProg)}% [COMPUTING]`;

                if (Math.random() < 0.1) {
                    idx = (idx + 1) % loadingMessages.length;
                    msg.style.opacity = 0;
                    setTimeout(() => {
                        msg.textContent = loadingMessages[idx];
                        msg.style.opacity = 1;
                    }, 150);
                }
            }, 50);

            try {
                // console.log("fetching analyze")
                const resp = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: txt })
                });

                clearInterval(messageInterval);

                if (!resp.ok) {
                    // console.log("it broke");
                    throw new Error("ERR: Connection to Oracle failed.");
                }
                
                const data = await resp.json();
                currentPatternData = data; 
                // console.log(data);
                
                // fast forward to 100
                document.getElementById('progressBar').style.width = `100%`;
                document.getElementById('progressText').textContent = `100% [READY]`;
                let elap = (Date.now() - start) / 1000;
                document.getElementById('timeText').textContent = `T+ ${elap.toFixed(2)}s`;

                // wait a sec
                await new Promise(r => setTimeout(r, 600));
                
                // swap layout
                document.getElementById('inputSection').style.display = 'none';
                document.getElementById('canvasSection').style.display = 'flex';
                document.getElementById('progressUi').style.display = 'none';
                
                spin.style.display = 'none';
                msg.textContent = `> EMOTION: [${data.metadata.primary_emotion.toUpperCase()}] | WEAVING MATRIX...`;
                
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, 400, 400);

                const g = data.grid;
                const sz = 50;
                const cSize = 400 / sz;
                
                let y = 0;
                let x = 0;

                function draw() {
                    for(let i=0; i<10; i++) {
                        if (y >= sz) {
                            // done
                            msg.textContent = `> PROCESS COMPLETE: "${data.metadata.poetic_subtitle.toUpperCase()}"`;
                            dBtn.style.display = 'block';
                            return;
                        }

                        const col = g[y][x];
                        ctx.fillStyle = col;
                        ctx.fillRect(x * cSize, y * cSize, cSize + 0.5, cSize + 0.5); 
                        
                        // rgb chunk
                        const r = parseInt(col.slice(1,3), 16);
                        const g_val = parseInt(col.slice(3,5), 16);
                        const b_val = parseInt(col.slice(5,7), 16);
                        const luma = 0.2126 * r + 0.7152 * g_val + 0.0722 * b_val;
                        
                        // draw dot
                        ctx.fillStyle = luma < 150 ? '#ffffff' : '#000000';
                        ctx.beginPath();
                        ctx.arc((x * cSize) + (cSize/2), (y * cSize) + (cSize/2), cSize/10, 0, Math.PI * 2);
                        ctx.fill();

                        x++;
                        if (x >= sz) { x = 0; y++; }
                    }
                    requestAnimationFrame(draw);
                }
                
                requestAnimationFrame(draw);

            } catch (err) {
                // console.error(err);
                clearInterval(messageInterval);
                spin.style.display = 'none';
                msg.textContent = err.message;
                msg.className = 'error';
                btn.disabled = false;
            }
        }
        
        async function downloadPDF() {
            const dBtn = document.getElementById('downloadBtn');
            const msg = document.getElementById('message');
            const spin = document.getElementById('spinner');
            
            if (!currentPatternData) return;
            
            dBtn.disabled = true;
            spin.style.display = 'inline-block';
            msg.textContent = "> COMPILING PDF BLUEPRINT...";
            
            try {
                // console.log("getting pdf");
                const resp = await fetch('/render_pdf', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(currentPatternData)
                });
                
                if (!resp.ok) {
                    throw new Error("ERR: Compilation failed.");
                }

                const blob = await resp.blob();
                let fName = `loom_blueprint_${currentPatternData.metadata.primary_emotion.toLowerCase()}.pdf`;
                
                const disp = resp.headers.get('content-disposition');
                if (disp && disp.indexOf('attachment') !== -1) {
                    var reg = /filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/;
                    var match = reg.exec(disp);
                    if (match != null && match[1]) fName = match[1].replace(/['"]/g, '');
                }

                // download hack
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = fName;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
                
                msg.textContent = "> BLUEPRINT SECURELY DOWNLOADED.";
            } catch (err) {
                // console.error("error downloading");
                msg.textContent = err.message;
                msg.className = 'error';
            } finally {
                dBtn.disabled = false;
                spin.style.display = 'none';
            }
        }
    </script>
</body>
</html>
